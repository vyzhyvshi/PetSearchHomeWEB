name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore "PetSearchHome_WEB.sln"

      - name: Build
        run: dotnet build "PetSearchHome_WEB.sln" --configuration Release --no-restore

      - name: Test
        run: dotnet test "PetSearchHome_WEB.sln" --configuration Release --no-build --collect:"XPlat Code Coverage"
